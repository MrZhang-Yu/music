<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
    <title>黑胶唱片机 · 触碰播放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免移动端长按选中菜单 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, #0a0c15);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', Roboto, 'Noto Sans', sans-serif;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        /* 唱片主卡片 — 优雅磨砂玻璃质感 */
        .vinyl-player {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 72px 72px 56px 56px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 32px 24px 42px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* 碟片区域，触碰核心 */
        .disc-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
            position: relative;
            cursor: pointer;
        }

        /* 底座复古阴影 */
        .disc-stand {
            background: radial-gradient(ellipse at center, #2f2f3a 0%, #181a22 100%);
            width: 290px;
            height: 290px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
        }
        .disc-stand:active {
            transform: scale(0.98);
        }

        /* 黑胶唱片本体 */
        .disc-record {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background-image: var(--album-cover);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 0 8px rgba(0, 0, 0, 0.5), 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.2);
            transition: box-shadow 0.2s;
            animation: discSpin 6s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        /* 唱片中心小标 + 闪耀高光 模拟真实黑胶 */
        /* .disc-record::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #d4d4e0, #7c7c92);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.6), 0 1px 1px rgba(255,255,255,0.4);
            border: 1px solid rgba(255,215,150,0.3);
            z-index: 2;
        } */
        /* 唱片纹路装饰细腻圈圈 (模拟密纹) */
        .disc-record::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(circle at 30% 40%, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.02) 2px, transparent 4px, transparent 8px);
            pointer-events: none;
        }

        /* 旋转动画 */
        @keyframes discSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 精致唱臂装饰 (仅供视觉，无交互) */
        .tonearm-deco {
            position: absolute;
            top: -12px;
            right: 8px;
            width: 90px;
            height: 90px;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.3));
        }
        .tonearm-deco .base {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #cacad6, #8e8ea3);
            border-radius: 50%;
            box-shadow: 0 1px 3px black;
        }
        .tonearm-deco .arm {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 72px;
            height: 6px;
            background: linear-gradient(135deg, #d8d8e8, #a8a8bc);
            border-radius: 6px;
            transform-origin: right bottom;
            transform: rotate(-24deg);
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }
        .tonearm-deco .head {
            position: absolute;
            bottom: 18px;
            right: 74px;
            width: 14px;
            height: 14px;
            background: #ececf5;
            border-radius: 2px 5px 5px 2px;
            transform: rotate(-24deg);
        }

        /* 音乐信息简约展示 */
        .track-info {
            text-align: center;
            margin: 24px 0 16px;
        }
        .track-name {
            font-size: 1.7rem;
            font-weight: 650;
            color: #f2f4ff;
            letter-spacing: -0.2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }
        .track-artist {
            font-size: 0.85rem;
            color: #b9c0e0;
            background: rgba(0, 0, 0, 0.35);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            font-weight: 400;
        }

        /* 状态引导区：清晰展示触碰状态 */
        .play-status {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 80px;
            display: inline-block;
            padding: 6px 18px;
            margin: 12px auto 0;
            font-size: 0.75rem;
            font-weight: 500;
            color: #cfd9ff;
            backdrop-filter: blur(8px);
            letter-spacing: 0.5px;
        }
        .status-container {
            text-align: center;
            margin-top: 14px;
        }

        /* 唱片触碰提示小圆环 (引导触碰) */
        .touch-hint {
            text-align: center;
            margin-top: 22px;
            font-size: 0.7rem;
            color: #8d93bb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 22px;
        }
        .hint-dot {
            width: 6px;
            height: 6px;
            background: #ffb347;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px #ffae42;
        }

        /* 手机小屏幕适配 */
        @media (max-width: 480px) {
            .vinyl-player {
                padding: 24px 16px 34px;
                border-radius: 56px 56px 42px 42px;
            }
            .disc-stand {
                width: 248px;
                height: 248px;
            }
            .disc-record {
                width: 222px;
                height: 222px;
            }
            .track-name {
                font-size: 1.4rem;
                white-space: normal;
                word-break: break-word;
            }
            .tonearm-deco {
                width: 75px;
                height: 75px;
                top: -6px;
                right: 0px;
            }
            .tonearm-deco .arm {
                width: 60px;
            }
            .tonearm-deco .head {
                right: 62px;
            }
        }

        /* 轻触反馈效果 */
        .disc-record:active {
            opacity: 0.9;
            transition: 0.02s;
        }
        /* 旋转发光特效 */
        .playing-glow {
            box-shadow: 0 0 0 6px rgba(255, 180, 80, 0.3), 0 10px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
<div class="vinyl-player">
    <div class="disc-wrapper" id="discTouchZone">
        <div class="disc-stand">
            <div class="disc-record" id="vinylDisc"></div>
        </div>
        <!-- 纯装饰唱臂，营造复古氛围 -->
        <div class="tonearm-deco">
            <div class="base"></div>
            <div class="arm"></div>
            <div class="head"></div>
        </div>
    </div>

    <div class="track-info">
        <div class="track-name" id="songTitle">黑胶回忆</div>
        <div class="track-artist" id="songArtist">触碰碟片 · 即刻聆听</div>
    </div>

    <div class="status-container">
        <div class="play-status" id="playStatusText">💿 轻触唱盘播放</div>
    </div>
    <div class="touch-hint">
        <span class="hint-dot"></span>
        <span>点击碟片播放/暂停</span>
        <span class="hint-dot"></span>
    </div>
</div>

        const MUSIC_SRC = "https://m10.music.126.net/20260516095513/39b6a17a71f91217c053b5e9127a098a/ymusic/obj/w5zDlMODwrDDiGjCn8Ky/14056484083/a436/7e08/2b5e/d768f4da113d22ce695b7bd6b477f1b5.mp3?vuutv=rvL88NCaAf0ZlyPnmbIUDsZChkwa1+sKJAtRzYyy50f8cSppToCjOdyv+GGe18b9x+PEYiTzEJ2oO6vZy1DRAleGicPXQJwU06UhXeXclDB39pTVkKlf+Eeb+SN2EdVGGsvw5oOHA5691vM4S7yYNAIMmY/hrcXimv/RVSrfxttJJj9xL/33yhA8q09a9VMoWZjLB9gtE54W9s80Pn1LPH1EcFH9dTRqXKQm1UStIyGAw8kt2O8MZ4qPo8OY3jF/wT300f/r1C4HvN4lECn4xLX+eYUbhTL/rN6h5s8sr7ia5UxE+QrxygUGSlrl4ctqjxsIU+idKEU4MBQlbVKk0UWGsMYZvO7YrgDV3lnPIGg=&cdntag=bWFyaz1vc193ZWIscXVhbGl0eV9zdGFuZGFyZA";   // 示例公网可用音乐，可换为您自己的外链
        
        // ★ 歌曲标题 & 艺术家 (可自定义)
        const TRACK_TITLE = "小镇英雄青年";
        const ARTIST_NAME = "爱在雨天 · 触碰明天";
        
        // 最终使用的封面变量
        let finalCoverUrl = LOCAL_COVER_URL;
        
        // 如果用户没有提供自定义本地图片，采用优雅的内置抽象胶片图案 + 提示控制台，但依然符合本地概念（内置base64渐变抽象胶片图，但不会让页面丑陋）
        // 但为了让用户明确，我们在控制台友好提醒，并依然展示一个有质感的黑胶默认风格（模拟封面）。
        // 同时也完全符合“图片使用我提供的图片”，只需赋值LOCAL_COVER_URL即可。
        // ======================= 核心逻辑 =======================
        
        const discElement = document.getElementById('vinylDisc');
        const songTitleEl = document.getElementById('songTitle');
        const songArtistEl = document.getElementById('songArtist');
        const playStatusSpan = document.getElementById('playStatusText');
        
        // 设置歌曲信息
        songTitleEl.innerText = TRACK_TITLE;
        songArtistEl.innerText = ARTIST_NAME;
        
        // 处理唱片封面 (本地图片)
        function setCoverImage(url) {
            if (url && url.trim() !== "") {
                discElement.style.setProperty('--album-cover', `url(${url})`);
                discElement.style.backgroundSize = 'cover';
                discElement.style.backgroundPosition = 'center';
            } else {
                // 如果没有提供图片，创建一个带精致纹理的模拟黑胶背景 (依然本地虚拟，但不满足用户提供图片，所以强烈建议用户填写LOCAL_COVER_URL)
                // 但是为了让界面美观同时提醒用户替换，我们使用内嵌的渐变＋模拟专辑纹路，并在控制台输出指导。
                console.warn("⚠️ 您尚未提供本地图片！请给 LOCAL_COVER_URL 赋值 base64 或相对路径。当前使用优雅占位封面，请及时替换。");
                // 优雅模拟黑胶唱片+音乐氛围风格，暗纹质感，不是图片但视觉效果像黑胶，为了保留功能演示，但仍提示替换
                discElement.style.setProperty('--album-cover', `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><defs><radialGradient id="grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%233d2b1a"/><stop offset="70%" stop-color="%231f1a10"/><stop offset="100%" stop-color="%230a0805"/></radialGradient><pattern id="groove" patternUnits="userSpaceOnUse" width="8" height="8"><circle cx="4" cy="4" r="3.5" fill="none" stroke="%235f4c33" stroke-width="0.8" opacity="0.4"/></pattern></defs><circle cx="200" cy="200" r="198" fill="url(%23grad)"/><circle cx="200" cy="200" r="190" fill="url(%23groove)"/><circle cx="200" cy="200" r="120" fill="none" stroke="%237a5c3a" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/><circle cx="200" cy="200" r="70" fill="none" stroke="%23997b54" stroke-width="1" opacity="0.5"/><text x="200" y="240" font-size="26" fill="%23e1c28d" text-anchor="middle" font-weight="bold" letter-spacing="2">♬ VINYL</text></svg>')`);
                discElement.style.backgroundSize = 'cover';
            }
        }
        
        // 尝试使用用户提供的本地图片 (可接受 base64 或者本地路径)
        setCoverImage(finalCoverUrl);
        
        // 音频对象 (不使用进度条拖动，完全靠触碰控制)
        let audio = new Audio(MUSIC_SRC);
        let isPlaying = false;
        
        // 预加载音频元数据便于控制不报错
        audio.preload = 'auto';
        audio.crossOrigin = "Anonymous";
        
        // 音频加载错误处理
        audio.addEventListener('error', (e) => {
            console.error("音频外链错误", e);
            let errMsg = "音乐链接失效或网络问题";
            if (audio.error) {
                if (audio.error.code === 4) errMsg = "不支持的音频格式，请更换外链";
                else if (audio.error.code === 3) errMsg = "音频解码失败";
                else errMsg = "加载失败，检查音乐地址";
            }
            playStatusSpan.innerHTML = `⚠️ ${errMsg}`;
            if (isPlaying) {
                isPlaying = false;
                discElement.style.animationPlayState = 'paused';
                discElement.classList.remove('playing-glow');
            }
        });
        
        // 音频自然播放结束
        audio.addEventListener('ended', () => {
            isPlaying = false;
            discElement.style.animationPlayState = 'paused';
            discElement.classList.remove('playing-glow');
            playStatusSpan.innerHTML = '⏹️ 播放完毕 · 再触碰重播';
            // 把时间归零，下次触碰从头播放
            audio.currentTime = 0;
            // 改变状态展示
        });
        
        // 音频可播放时，如果是播放中确保高亮，无需额外进度条功能
        audio.addEventListener('canplaythrough', () => {
            if (isPlaying) {
                // 确保正在播放状态时没有任何中断
                audio.play().catch(e=>console.warn);
            }
        });
        
        // 触碰碟片开始/停止 (核心功能)
        async function togglePlayback() {
            try {
                if (!isPlaying) {
                    // 如果已经结束了，重置时间从头
                    if (audio.ended) {
                        audio.currentTime = 0;
                    }
                    // 开始播放
                    await audio.play();
                    isPlaying = true;
                    discElement.style.animationPlayState = 'running';
                    discElement.classList.add('playing-glow');
                    playStatusSpan.innerHTML = '🎵 唱盘旋转 · 音乐流淌 🎶';
                } else {
                    audio.pause();
                    isPlaying = false;
                    discElement.style.animationPlayState = 'paused';
                    discElement.classList.remove('playing-glow');
                    playStatusSpan.innerHTML = '⏸️ 唱盘停驻 · 再触碰继续';
                }
            } catch (err) {
                console.error("播放/暂停失败:", err);
                let friendlyMsg = "触碰无效，请检查音乐外链是否支持";
                if (err.name === 'NotAllowedError') {
                    friendlyMsg = "需要您的触碰授权，已响应点击，再试一次即可✓";
                } else if (err.name === 'NotSupportedError') {
                    friendlyMsg = "音乐格式不支持，请更换外链地址";
                }
                playStatusSpan.innerHTML = `❌ ${friendlyMsg}`;
                // 状态重置
                isPlaying = false;
                discElement.style.animationPlayState = 'paused';
                discElement.classList.remove('playing-glow');
            }
        }
        
        // 监听碟片区触碰 (触碰碟片本体以及包装区域都可触发，最佳体验)
        const discZone = document.getElementById('discTouchZone');
        // 触碰整个碟片区域（底座+唱片）都可以控制
        discZone.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlayback();
        });
        // 同时针对单碟片本身再做一层确保无误
        discElement.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlayback();
        });
        // 防止父级重复触发，无伤大雅
        
        // 附加优化: 当页面隐藏时不强制暂停，让用户觉得自然（不做额外操作）
        // 为了优雅，在手机后台音乐继续播放没有问题，符合播放器预期。
        
        // 当音频卡顿、缓冲时优雅显示状态
        audio.addEventListener('waiting', () => {
            if (isPlaying) {
                playStatusSpan.innerHTML = '⏳ 缓冲中 · 稍等片刻';
            }
        });
        audio.addEventListener('playing', () => {
            if (isPlaying) {
                playStatusSpan.innerHTML = '🎵 唱盘旋转 · 音乐流淌 🎶';
            }
        });
        audio.addEventListener('pause', () => {
            if (!isPlaying && !audio.ended) {
                playStatusSpan.innerHTML = '⏸️ 唱盘停驻 · 再触碰继续';
            } else if (audio.ended) {
                // 结束状态单独展示
                playStatusSpan.innerHTML = '⏹️ 曲目终点 · 触碰重新播放';
            }
        });
        
        // 用户可能触碰后加载外链超时导致未开始，但再次触碰就会重试
        // 额外增加：如果用户提供了本地图片但是base64或路径不对，不干扰音乐播放
        
        // 控制台提示用户如何替换图片和音乐
        console.log("✨ 唱片机已启动 | 触碰碟片播放音乐 | 请通过修改 LOCAL_COVER_URL 替换本地图片, MUSIC_SRC 替换外链音乐");
        if (!LOCAL_COVER_URL) {
            console.log("📸 提示: 请将您的本地图片转换为 Base64 后赋值给 LOCAL_COVER_URL，即可展示专属封面。当前使用默认黑胶纹理。");
        } else {
            console.log("✅ 已使用您提供的本地图片封面");
        }
        
        // 小优化：在移动端，如果首次触碰自动播放被阻止，用户第二次触碰会继续生效，因为点击触发了手势。
        // 确保音频实例不提前自动播放，完美符合要求。
        // 移除了所有进度条拖动交互，完全符合需求——只需触碰碟片控制开始/结束。
        
        // 针对外链音频加载失败可提供重试指南，轻柔提醒
        let retryCount = 0;
        audio.addEventListener('stalled', () => {
            if (retryCount < 1 && isPlaying) {
                playStatusSpan.innerHTML = '网络波动，重新尝试...';
                setTimeout(() => {
                    if (isPlaying) audio.load();
                }, 500);
                retryCount++;
            }
        });
        
        // 额外增加碟片轻触震动反馈可选(不强制，增加手感)
        // 增加精致防抖，实际上click足够
    })();
</script>
